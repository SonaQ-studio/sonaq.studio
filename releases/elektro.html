<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электро — SonaQ</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .release-page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
        .release-header { display: flex; gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .cover { width: 280px; height: 280px; border-radius: 12px; border: 1px solid #00f7ff33; object-fit: cover; flex-shrink: 0; }
        .release-info h1 { font-size: 2.5rem; color: #00f7ff; margin-bottom: 0.5rem; }
        .release-date { color: #ff00aa; font-size: 1.1rem; margin-bottom: 1rem; }
        .section-title { color: #00f7ff; margin: 2.5rem 0 1rem; font-size: 1.4rem; }
        .lyrics { background: #1a1a2e; padding: 1.5rem; border-radius: 10px; white-space: pre-line; line-height: 1.7; border: 1px solid #00f7ff22; }
        .platform-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .platform-link { display: flex; align-items: center; gap: 10px; padding: 12px 18px; background: #1a1a2e; border: 1px solid #00f7ff33; border-radius: 8px; color: #e0e0e0; text-decoration: none; transition: all 0.2s; }
        .platform-link:hover { border-color: #00f7ff; color: #00f7ff; transform: translateY(-2px); }
        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 2rem; color: #00f7ff; text-decoration: none; }
    </style>
</head>
<body>
    <nav><div class="nav-container"><a href="../index.html" class="logo">SonaQ</a></div></nav>
    <div class="release-page">
        <a href="../index.html#releases" class="back-link"><i class="fas fa-arrow-left"></i> Все релизы</a>
        <div class="release-header">
            <img src="../images/releases/elektro.jpg" alt="Электро" class="cover" onerror="this.src='../og-image.jpg'">
            <div class="release-info">
                <h1>Электро</h1>
                <div class="release-date">14 июля 2026 — русские площадки</div>
                <p><strong>Описание:</strong> [Описание трека]</p>
            </div>
        </div>
        <h2 class="section-title">Текст песни</h2>
        <div class="lyrics">[Текст песни]</div>
        <h2 class="section-title">Слушать</h2>
        <div class="platform-links">
            <a href="#" class="platform-link" target="_blank"><i class="fab fa-spotify"></i> <span>Spotify</span></a>
            <a href="#" class="platform-link" target="_blank"><i class="fas fa-music"></i> <span>Яндекс Музыка</span></a>
        </div>
        <div style="margin-top:2rem;"><h2 class="section-title">Клип</h2><a href="#" class="smart-link" target="_blank"><i class="fab fa-youtube"></i> Смотреть на YouTube</a></div>
    </div>
</body>
</html>
